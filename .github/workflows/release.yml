name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: win32
          - os: macos-14
            platform: darwin

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Node dependencies
        run: npm ci

      - name: Create Python venv and install backend deps
        shell: bash
        run: |
          python -m venv apps/backend/.venv
          if [ "${{ matrix.platform }}" = "win32" ]; then
            source apps/backend/.venv/Scripts/activate
          else
            source apps/backend/.venv/bin/activate
          fi
          pip install -e "apps/backend.[models,packaging]"

      - name: Prepare Windows signing certificate
        if: matrix.platform == 'win32' && secrets.WINDOWS_CERT_BASE64 != ''
        shell: bash
        env:
          WINDOWS_CERT_BASE64: ${{ secrets.WINDOWS_CERT_BASE64 }}
          WINDOWS_CERT_PASSWORD: ${{ secrets.WINDOWS_CERT_PASSWORD }}
        run: |
          echo "$WINDOWS_CERT_BASE64" | base64 -d > "$RUNNER_TEMP/signing.pfx"
          echo "WINDOWS_CERT_FILE=$RUNNER_TEMP/signing.pfx" >> "$GITHUB_ENV"
          echo "WINDOWS_CERT_PASSWORD=$WINDOWS_CERT_PASSWORD" >> "$GITHUB_ENV"

      - name: Build backend bundle
        run: npm run build:backend

      - name: Package desktop app
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        run: npm run make

      - name: Upload installer artifacts
        uses: actions/upload-artifact@v4
        with:
          name: desktop-${{ matrix.platform }}
          path: |
            apps/desktop/out/make/**/*
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: desktop-win32
          path: artifacts/win32

      - name: Download macOS artifacts
        uses: actions/download-artifact@v4
        with:
          name: desktop-darwin
          path: artifacts/darwin

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: |
            artifacts/**/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
